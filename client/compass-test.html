<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  body { background:#1a1a2e; display:flex; flex-wrap:wrap; gap:20px; padding:20px; font-family:sans-serif; color:#ccc; }
  .box { text-align:center; }
  svg { display:block; }
  --primary:#4f8ef7; --border:#333; --surface2:#242438; --text-muted:#888; --accent:#f59e0b;
</style>
</head>
<body>
<script>
// Render several headings to verify the beam pattern
const headings = [
  {az:0,   label:'N  (0°)'},
  {az:45,  label:'NE (45°)'},
  {az:71,  label:'US (71°)'},
  {az:90,  label:'E  (90°)'},
  {az:180, label:'S (180°)'},
  {az:270, label:'W (270°)'},
  {az:352, label:'Vancouver (352°)'},
];

headings.forEach(({az, label}) => {
  const div = document.createElement('div');
  div.className = 'box';
  div.innerHTML = `
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#333" stroke-width="2"/>
      <circle cx="100" cy="100" r="78" fill="#242438" stroke="#333" stroke-width="1"/>
      <text x="100" y="24"  text-anchor="middle" fill="#888" font-size="12">N</text>
      <text x="180" y="105" text-anchor="middle" fill="#888" font-size="12">E</text>
      <text x="100" y="188" text-anchor="middle" fill="#888" font-size="12">S</text>
      <text x="20"  y="105" text-anchor="middle" fill="#888" font-size="12">W</text>
      <g transform="rotate(${az} 100 100)">
        <path d="M 100 100 L 35 35 A 92 92 0 0 1 165 35 Z"
              fill="#4f8ef7" fill-opacity="0.18"/>
        <line x1="100" y1="100" x2="35"  y2="35"  stroke="#4f8ef7" stroke-width="1.5" stroke-opacity="0.7"/>
        <line x1="100" y1="100" x2="165" y2="35"  stroke="#4f8ef7" stroke-width="1.5" stroke-opacity="0.7"/>
        <line x1="100" y1="100" x2="100" y2="10"  stroke="#4f8ef7" stroke-width="2.5"/>
        <polygon points="100,6 105,18 95,18" fill="#4f8ef7"/>
      </g>
      <circle cx="100" cy="100" r="5" fill="#f59e0b"/>
      <text x="100" y="118" text-anchor="middle" fill="#f59e0b" font-size="11">${az}°</text>
    </svg>
    <div style="margin-top:4px;font-size:12px">${label}</div>`;
  document.body.appendChild(div);
});
</script>
</body>
</html>
